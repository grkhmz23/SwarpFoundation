<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="SWARP Luxury Utility Schematic">
  <defs>
    <!-- 
      LUXURY BRAND PALETTE (UPDATED)
      Primary Blue: #00D4FF
      Purple: #9D4EDD
      Cyan: #00FFF0 (Highlight)
      Dark: #0A0E27
      Darker: #050714
    -->

    <!-- 1. Complex Gradients -->
    
    <!-- The "Aurora" Background Mesh - Adjusted for new Darker/Dark tones -->
    <radialGradient id="auroraTopLeft" cx="0" cy="0" r="1">
      <stop offset="0%" stop-color="#9D4EDD" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#050714" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraBottomRight" cx="1" cy="1" r="1">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#050714" stop-opacity="0"/>
    </radialGradient>

    <!-- Metallic/Glass Border Gradient (The "Luxury" Stroke) -->
    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="20%" stop-color="#00D4FF" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#9D4EDD" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00FFF0" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Card Surface Gradient (Frosted Look) - Updated to #0A0E27 -->
    <linearGradient id="glassSurface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0E27" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#050714" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Neon Data Flow -->
    <linearGradient id="dataFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9D4EDD"/>
      <stop offset="100%" stop-color="#00FFF0"/>
    </linearGradient>

    <!-- Presale Highlight Gradient -->
    <linearGradient id="presaleHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#00FFF0" stop-opacity="0.1"/>
        <stop offset="100%" stop-color="#00FFF0" stop-opacity="0"/>
    </linearGradient>

    <!-- 2. Filters for Depth and Glow -->
    
    <!-- Soft Ambient Glow -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Intense Core Glow -->
    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cinematic Noise (Film Grain) -->
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
         <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feComposite operator="in" in2="SourceGraphic" result="grain"/>
      <feComposite operator="over" in="SourceGraphic" in2="grain"/>
    </filter>

    <!-- 3. Patterns -->
    <pattern id="dotGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#FFFFFF" fill-opacity="0.07"/>
    </pattern>

    <!-- 4. Typography Styles -->
    <style>
      .sans-bold { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 800; letter-spacing: -0.02em; }
      .sans-med { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 500; letter-spacing: 0.02em; }
      .mono { font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace; font-weight: 400; letter-spacing: 0.05em; }
      
      /* Animation for Presale Pulse */
      @keyframes pulse {
        0% { opacity: 0.6; }
        50% { opacity: 1; }
        100% { opacity: 0.6; }
      }
      .pulsing { animation: pulse 3s infinite ease-in-out; }
    </style>
  </defs>

  <!-- BACKGROUND LAYER - Updated to Darker #050714 -->
  <rect width="1080" height="1080" fill="#050714"/>
  
  <!-- Aurora Ambient Lights -->
  <circle cx="0" cy="0" r="800" fill="url(#auroraTopLeft)"/>
  <circle cx="1080" cy="1080" r="800" fill="url(#auroraBottomRight)"/>
  
  <!-- Technical Grid -->
  <rect width="1080" height="1080" fill="url(#dotGrid)"/>

  <!-- CONNECTING DATA PIPES (Behind cards) -->
  <g fill="none" stroke-linecap="round">
    <!-- Path from Airdrops (Left) to Center -->
    <path d="M 255 520 C 350 520, 380 540, 540 540" stroke="url(#dataFlow)" stroke-width="2" opacity="0.4"/>
    <path d="M 255 520 C 350 520, 380 540, 540 540" stroke="#00D4FF" stroke-width="6" opacity="0.1"/>
    
    <!-- Path from Cashback (Right) to Center -->
    <path d="M 825 520 C 730 520, 700 540, 540 540" stroke="url(#dataFlow)" stroke-width="2" opacity="0.4" transform="scale(-1, 1) translate(-1080, 0)"/>
    
    <!-- Path from Ecosystem (Bottom) to Center -->
    <path d="M 540 820 C 540 700, 540 680, 540 640" stroke="url(#dataFlow)" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- MAIN CONTENT GROUP -->
  <g filter="url(#noiseFilter)">

    <!-- CENTRAL REACTOR (The Token) -->
    <g transform="translate(540, 540)">
        <!-- Outer Orbital Rings -->
        <circle r="180" fill="none" stroke="#2a2e45" stroke-width="1" stroke-dasharray="4 6" opacity="0.5"/>
        <circle r="140" fill="none" stroke="url(#glassBorder)" stroke-width="1.5" opacity="0.3"/>
        
        <!-- Rotating Ticks Decoration -->
        <g opacity="0.6">
            <path d="M 0 -160 L 0 -170" stroke="#00FFF0" stroke-width="2"/>
            <path d="M 0 160 L 0 170" stroke="#00FFF0" stroke-width="2"/>
            <path d="M -160 0 L -170 0" stroke="#9D4EDD" stroke-width="2"/>
            <path d="M 160 0 L 170 0" stroke="#9D4EDD" stroke-width="2"/>
        </g>

        <!-- The Core Card -->
        <g filter="url(#softGlow)">
            <rect x="-110" y="-110" width="220" height="220" rx="40" fill="url(#glassSurface)" stroke="url(#glassBorder)" stroke-width="2"/>
            <!-- Inner Bevel Shadow -->
            <rect x="-106" y="-106" width="212" height="212" rx="38" fill="none" stroke="#000000" stroke-width="2" opacity="0.5"/>
        </g>

        <!-- Core Graphics -->
        <circle r="60" fill="rgba(0,212,255,0.2)" filter="url(#coreGlow)"/>
        <!-- CHANGED: Added $ symbol -->
        <text class="sans-bold" x="0" y="15" text-anchor="middle" fill="#FFFFFF" font-size="42" letter-spacing="0.05em" filter="url(#coreGlow)">$SWARP</text>
        
        <!-- UPDATED CORE TEXT -->
        <rect x="-60" y="35" width="120" height="20" rx="4" fill="#00FFF0" fill-opacity="0.1"/>
        <text class="mono pulsing" x="0" y="49" text-anchor="middle" fill="#00FFF0" font-size="11" font-weight="700">PRESALE SOON</text>
        
        <!-- Decorative brackets -->
        <path d="M -40 -60 L -50 -60 L -50 -50" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
        <path d="M 40 -60 L 50 -60 L 50 -50" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
        <path d="M -40 85 L -50 85 L -50 75" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
        <path d="M 40 85 L 50 85 L 50 75" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.5"/>
    </g>

    <!-- MODULE 1: AIRDROPS (Left) -->
    <g transform="translate(90, 410)">
        <defs>
            <filter id="dropShadow1" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.6"/>
            </filter>
        </defs>
        
        <!-- Card Body -->
        <rect width="330" height="220" rx="24" fill="url(#glassSurface)" filter="url(#dropShadow1)"/>
        <rect width="330" height="220" rx="24" fill="none" stroke="url(#glassBorder)" stroke-width="1.5"/>
        
        <!-- Header -->
        <rect x="24" y="24" width="40" height="40" rx="12" fill="rgba(0,212,255,0.1)" stroke="rgba(0,212,255,0.3)"/>
        <!-- Icon: Parachute/Box -->
        <path d="M 44 36 L 52 52 H 36 L 44 36 Z" fill="#00D4FF" filter="url(#coreGlow)"/>
        
        <!-- CHANGED: Moved Label Up (y:42->38) -->
        <text class="mono" x="80" y="38" fill="#00D4FF" font-size="11" opacity="0.8">01 /// DISTRIBUTE</text>
        <!-- CHANGED: Moved Title Down (y:62->68) -->
        <text class="sans-bold" x="80" y="68" fill="white" font-size="20">Airdrops</text>

        <!-- CHANGED: Moved Divider Down (y:85->95) -->
        <line x1="24" y1="95" x2="306" y2="95" stroke="white" stroke-opacity="0.1"/>

        <!-- List Content -->
        <!-- CHANGED: Moved List Down (y:120->130) -->
        <g transform="translate(24, 130)">
            <circle cx="4" cy="-4" r="2" fill="#00D4FF"/>
            <text class="sans-med" x="16" y="0" fill="white" font-size="16" opacity="0.9">Ecosystem Rewards</text>
            
            <circle cx="4" cy="26" r="2" fill="#00D4FF"/>
            <text class="sans-med" x="16" y="30" fill="white" font-size="16" opacity="0.9">Campaign Access</text>
            
            <circle cx="4" cy="56" r="2" fill="#00D4FF"/>
            <text class="sans-med" x="16" y="60" fill="white" font-size="16" opacity="0.9">Active Bonuses</text>
        </g>
    </g>

    <!-- MODULE 2: CASHBACK (Right) -->
    <g transform="translate(660, 410)">
        <!-- Card Body -->
        <rect width="330" height="220" rx="24" fill="url(#glassSurface)" filter="url(#dropShadow1)"/>
        <rect width="330" height="220" rx="24" fill="none" stroke="url(#glassBorder)" stroke-width="1.5"/>

        <!-- Header -->
        <rect x="24" y="24" width="40" height="40" rx="12" fill="rgba(157,78,221,0.1)" stroke="rgba(157,78,221,0.3)"/>
        <!-- Icon: Refresh/Cycle -->
        <path d="M 44 34 A 8 8 0 1 1 36 44" fill="none" stroke="#9D4EDD" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 44 30 L 44 38" stroke="#9D4EDD" stroke-width="2.5" stroke-linecap="round"/>
        
        <!-- CHANGED: Moved Label Up (y:42->38) -->
        <text class="mono" x="80" y="38" fill="#9D4EDD" font-size="11" opacity="0.8">02 /// RETURN</text>
        <!-- CHANGED: Moved Title Down (y:62->68) -->
        <text class="sans-bold" x="80" y="68" fill="white" font-size="20">Cashback</text>

        <!-- CHANGED: Moved Divider Down (y:85->95) -->
        <line x1="24" y1="95" x2="306" y2="95" stroke="white" stroke-opacity="0.1"/>

        <!-- List Content -->
        <!-- CHANGED: Moved List Down (y:120->130) -->
        <g transform="translate(24, 130)">
            <circle cx="4" cy="-4" r="2" fill="#9D4EDD"/>
            <text class="sans-med" x="16" y="0" fill="white" font-size="16" opacity="0.9">Activity Rebates</text>
            
            <circle cx="4" cy="26" r="2" fill="#9D4EDD"/>
            <text class="sans-med" x="16" y="30" fill="white" font-size="16" opacity="0.9">Loyalty Multipliers</text>
            
            <circle cx="4" cy="56" r="2" fill="#9D4EDD"/>
            <text class="sans-med" x="16" y="60" fill="white" font-size="16" opacity="0.9">Instant Settlement</text>
        </g>
    </g>

    <!-- MODULE 3: ECOSYSTEM (Bottom) -->
    <g transform="translate(365, 820)">
        <!-- Card Body -->
        <rect width="350" height="100" rx="24" fill="url(#glassSurface)" filter="url(#dropShadow1)"/>
        <rect width="350" height="100" rx="24" fill="none" stroke="url(#glassBorder)" stroke-width="1.5"/>

        <!-- Header -->
        <rect x="24" y="30" width="40" height="40" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)"/>
        <!-- Icon: Grid -->
        <rect x="34" y="40" width="9" height="9" fill="#FFFFFF"/>
        <rect x="45" y="40" width="9" height="9" fill="#FFFFFF" opacity="0.5"/>
        <rect x="34" y="51" width="9" height="9" fill="#FFFFFF" opacity="0.5"/>
        <rect x="45" y="51" width="9" height="9" fill="#FFFFFF" opacity="0.2"/>

        <!-- CHANGED: Moved Label Up (y:48->42) -->
        <text class="mono" x="80" y="42" fill="#FFFFFF" font-size="11" opacity="0.6">03 /// EXPAND</text>
        <!-- CHANGED: Moved Title Down (y:70->74) -->
        <text class="sans-bold" x="80" y="74" fill="white" font-size="20">Ecosystem Bonuses</text>
        
        <!-- Status Indicator -->
        <rect x="260" y="40" width="60" height="20" rx="10" fill="rgba(0,255,240,0.1)"/>
        <text class="mono" x="290" y="54" text-anchor="middle" fill="#00FFF0" font-size="10">ACTIVE</text>
    </g>

    <!-- TOP HEADER (LEFT) -->
    <g transform="translate(90, 100)">
        <path d="M 0 0 L 20 0 L 25 5 L 20 10 L 0 10 Z" fill="#00D4FF"/>
        <text class="sans-bold" x="35" y="10" fill="white" font-size="24" letter-spacing="0.1em">SWARP</text>
        <text class="mono" x="135" y="10" fill="#00FFF0" font-size="14" opacity="0.9" font-weight="700">/// PRESALE_INIT_SOON</text>
    </g>

    <!-- PRESALE DATA HUD (TOP RIGHT) -->
    <!-- New section added for Token Info -->
    <g transform="translate(690, 80)">
        <!-- Glass Panel -->
        <path d="M 300 0 L 300 80 L 20 80 L 0 60 L 0 0 Z" fill="url(#glassSurface)" stroke="url(#glassBorder)" stroke-width="1"/>
        <path d="M 0 60 L 20 80" stroke="#00FFF0" stroke-width="2" opacity="0.5"/>
        
        <!-- Highlighting Pulse Bar -->
        <rect x="0" y="0" width="300" height="2" fill="#00FFF0"/>
        
        <!-- Data Rows -->
        <g transform="translate(20, 30)">
            <text class="mono" x="0" y="0" fill="#00FFF0" font-size="10" letter-spacing="0.1em">TOKEN PRICE</text>
            <!-- CHANGED: Added $ symbol to ticker info -->
            <text class="sans-bold" x="0" y="20" fill="white" font-size="18">$0.03 <tspan fill="#555" font-size="14" font-weight="400">/ $SWARP</tspan></text>
            
            <line x1="120" y1="-5" x2="120" y2="25" stroke="white" stroke-opacity="0.1"/>
            
            <text class="mono" x="140" y="0" fill="#9D4EDD" font-size="10" letter-spacing="0.1em">ALLOCATION (CAP)</text>
            <text class="sans-bold" x="140" y="20" fill="white" font-size="18">50,000,000</text>
        </g>
    </g>
    
    <!-- BOTTOM FOOTER -->
    <g transform="translate(90, 1020)">
       <text class="mono" x="0" y="0" fill="#555" font-size="12">SCHEMATIC RENDER [1080x1080] • NO FINANCIAL ADVICE</text>
       <text class="mono" x="900" y="0" text-anchor="end" fill="#555" font-size="12">DESIGNED BY SWARP</text>
    </g>
  </g>
  
  <!-- Final Vignette Overlay -->
  <radialGradient id="vignetteOverlay" cx="50%" cy="50%" r="50%">
    <stop offset="70%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#050714" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="1080" height="1080" fill="url(#vignetteOverlay)"/>

</svg>
